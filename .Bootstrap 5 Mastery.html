<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bootstrap Animated UI</title>

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>
body {
    font-family: 'Poppins', sans-serif;
}

/* Navbar hover */
.nav-link:hover {
    color: #0d6efd !important;
    transition: 0.3s;
}

/* Fade animation */
.fade-in {
    animation: fadeIn 1s ease-in;
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

/* Card hover animation */
.card {
    transition: 0.3s;
}
.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

/* Button hover */
.btn-custom {
    transition: 0.3s;
}
.btn-custom:hover {
    transform: scale(1.05);
}

/* Smooth scrolling */
html {
    scroll-behavior: smooth;
}
</style>

</head>

<body>

<!--  Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
  <div class="container">
    <a class="navbar-brand" href="#">MyUI</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="#home">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="#cards">Cards</a></li>
        <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Carousel -->
<div id="home" class="carousel slide fade-in" data-bs-ride="carousel">
  <div class="carousel-inner">

    <div class="carousel-item active">
      <img src="https://picsum.photos/1200/400?1" class="d-block w-100">
    </div>

    <div class="carousel-item">
      <img src="https://picsum.photos/1200/400?2" class="d-block w-100">
    </div>

  </div>
</div>

<!--  Grid System + Cards -->
<div id="cards" class="container my-5 fade-in">
  <div class="row g-4">

    <div class="col-12 col-md-4">
      <div class="card p-3 text-center">
        <h4>Card 1</h4>
        <p>Responsive layout example</p>
        <button class="btn btn-primary btn-custom" data-bs-toggle="modal" data-bs-target="#modal">
          Open
        </button>
      </div>
    </div>

    <div class="col-12 col-md-4">
      <div class="card p-3 text-center">
        <h4>Card 2</h4>
        <p>Bootstrap grid system</p>
        <button class="btn btn-success btn-custom">Click</button>
      </div>
    </div>

    <div class="col-12 col-md-4 d-none d-md-block">
      <div class="card p-3 text-center">
        <h4>Card 3</h4>
        <p>Hidden on mobile</p>
        <button class="btn btn-warning btn-custom">Explore</button>
      </div>
    </div>

  </div>
</div>

<!--  Modal -->
<div class="modal fade" id="modal">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5>Modal Title</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        This is a Bootstrap modal with animation.
      </div>

    </div>
  </div>
</div>

<!--  Buttons Section -->
<div id="contact" class="text-center my-5 fade-in">
  <h3>Contact Us</h3>
  <button class="btn btn-danger btn-custom m-2">Submit</button>
  <button class="btn btn-outline-dark btn-custom m-2">Cancel</button>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
