<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login & Register</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>
body {
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    height: 100vh;
}

/* Card animation */
.card {
    animation: fadeIn 1s ease;
    border-radius: 15px;
}

/* Fade */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

/* Input focus */
.form-control:focus {
    box-shadow: 0 0 8px #2575fc;
    border-color: #2575fc;
}

/* Button hover */
.btn-custom {
    transition: 0.3s;
}
.btn-custom:hover {
    transform: scale(1.05);
}

/* Toggle icon */
.toggle {
    cursor: pointer;
}
</style>
</head>

<body class="d-flex justify-content-center align-items-center">

<div class="card p-4 shadow" style="width: 350px;">

    <!-- Tabs -->
    <ul class="nav nav-tabs mb-3">
        <li class="nav-item">
            <button class="nav-link active" onclick="showLogin()">Login</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" onclick="showRegister()">Register</button>
        </li>
    </ul>

    <!-- LOGIN FORM -->
    <form id="loginForm">
        <div class="mb-3">
            <input type="email" id="loginEmail" class="form-control" placeholder="Email">
        </div>

        <div class="mb-3 position-relative">
            <input type="password" id="loginPassword" class="form-control" placeholder="Password">
            <i class="bi bi-eye position-absolute top-50 end-0 translate-middle-y me-3 toggle"
               onclick="togglePassword('loginPassword', this)"></i>
        </div>

        <button class="btn btn-dark w-100 btn-custom" type="submit">Login</button>
        <p id="loginMsg" class="text-danger mt-2"></p>
    </form>

    <!-- REGISTER FORM -->
    <form id="registerForm" style="display:none;">
        <div class="mb-3">
            <input type="text" id="name" class="form-control" placeholder="Full Name">
        </div>

        <div class="mb-3">
            <input type="email" id="regEmail" class="form-control" placeholder="Email">
        </div>

        <div class="mb-3 position-relative">
            <input type="password" id="regPassword" class="form-control" placeholder="Password">
            <i class="bi bi-eye position-absolute top-50 end-0 translate-middle-y me-3 toggle"
               onclick="togglePassword('regPassword', this)"></i>
        </div>

        <div class="mb-3 position-relative">
            <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm Password">
            <i class="bi bi-eye position-absolute top-50 end-0 translate-middle-y me-3 toggle"
               onclick="togglePassword('confirmPassword', this)"></i>
        </div>

        <button class="btn btn-primary w-100 btn-custom" type="submit">Register</button>
        <p id="regMsg" class="text-danger mt-2"></p>
    </form>

</div>

<script>
// Switch forms
function showRegister() {
    document.getElementById("loginForm").style.display = "none";
    document.getElementById("registerForm").style.display = "block";
}

function showLogin() {
    document.getElementById("loginForm").style.display = "block";
    document.getElementById("registerForm").style.display = "none";
}

// Show/Hide Password
function togglePassword(id, icon) {
    let input = document.getElementById(id);

    if (input.type === "password") {
        input.type = "text";
        icon.classList.replace("bi-eye", "bi-eye-slash");
    } else {
        input.type = "password";
        icon.classList.replace("bi-eye-slash", "bi-eye");
    }
}

// LOGIN VALIDATION
document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();

    let email = document.getElementById("loginEmail").value;
    let password = document.getElementById("loginPassword").value;

    if(email === "" || password === ""){
        document.getElementById("loginMsg").innerText = "All fields required!";
    } else {
        document.getElementById("loginMsg").innerText = "Login successful (demo)";
    }
});

// REGISTER VALIDATION
document.getElementById("registerForm").addEventListener("submit", function(e){
    e.preventDefault();

    let pass = document.getElementById("regPassword").value;
    let confirm = document.getElementById("confirmPassword").value;

    if(pass === "" || confirm === ""){
        document.getElementById("regMsg").innerText = "Fill all fields!";
    }
    else if(pass !== confirm){
        document.getElementById("regMsg").innerText = "Passwords do not match!";
    }
    else{
        document.getElementById("regMsg").innerText = "Registration successful (demo)";
    }
});
</script>

</body>
</html>
