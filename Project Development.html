<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Auth UI</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
}

/* Navbar */
.navbar {
    transition: 0.3s;
}
.nav-link:hover {
    color: #0d6efd !important;
}

/* Card animation */
.card {
    animation: fadeIn 1s ease;
    border-radius: 15px;
}

/* Fade animation */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

/* Input focus */
.form-control:focus {
    box-shadow: 0 0 8px #0d6efd;
    border-color: #0d6efd;
}

/* Button hover */
.btn-custom {
    transition: 0.3s;
}
.btn-custom:hover {
    transform: scale(1.05);
}

/* Footer */
footer {
    background: #000;
    color: #fff;
}

/* Toggle icon */
.toggle {
    cursor: pointer;
}
</style>
</head>

<body>

<!--  NAVBAR (Reusable Component) -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
  <div class="container">
    <a class="navbar-brand" href="#">MyApp</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="#" onclick="showLogin()">Login</a></li>
        <li class="nav-item"><a class="nav-link" href="#" onclick="showRegister()">Register</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- MAIN SECTION -->
<div class="container d-flex justify-content-center align-items-center" style="min-height: 90vh;">

<div class="card p-4 shadow w-100" style="max-width: 400px;">

    <!-- LOGIN -->
    <form id="loginForm">
        <h4 class="text-center mb-3">Login</h4>

        <input type="email" class="form-control mb-3" placeholder="Email">

        <div class="position-relative mb-3">
            <input type="password" id="loginPass" class="form-control" placeholder="Password">
            <i class="bi bi-eye position-absolute top-50 end-0 translate-middle-y me-3 toggle"
               onclick="togglePassword('loginPass', this)"></i>
        </div>

        <button class="btn btn-dark w-100 btn-custom">Login</button>
        <p class="text-center mt-2">Don't have account? <a href="#" onclick="showRegister()">Register</a></p>
    </form>

    <!-- REGISTER -->
    <form id="registerForm" style="display:none;">
        <h4 class="text-center mb-3">Register</h4>

        <input type="text" class="form-control mb-3" placeholder="Full Name">
        <input type="email" class="form-control mb-3" placeholder="Email">

        <div class="position-relative mb-3">
            <input type="password" id="regPass" class="form-control" placeholder="Password">
            <i class="bi bi-eye position-absolute top-50 end-0 translate-middle-y me-3 toggle"
               onclick="togglePassword('regPass', this)"></i>
        </div>

        <div class="position-relative mb-3">
            <input type="password" id="confirmPass" class="form-control" placeholder="Confirm Password">
            <i class="bi bi-eye position-absolute top-50 end-0 translate-middle-y me-3 toggle"
               onclick="togglePassword('confirmPass', this)"></i>
        </div>

        <button class="btn btn-primary w-100 btn-custom">Register</button>
        <p class="text-center mt-2">Already have account? <a href="#" onclick="showLogin()">Login</a></p>
    </form>

</div>
</div>

<!-- FOOTER (Reusable Component) -->
<footer class="text-center py-3">
    <p>© 2026 MyApp | All Rights Reserved</p>
</footer>

<!-- JS -->
<script>
// Switch forms
function showRegister(){
    document.getElementById("loginForm").style.display="none";
    document.getElementById("registerForm").style.display="block";
}

function showLogin(){
    document.getElementById("loginForm").style.display="block";
    document.getElementById("registerForm").style.display="none";
}

// Password toggle
function togglePassword(id, icon){
    let input = document.getElementById(id);

    if(input.type === "password"){
        input.type = "text";
        icon.classList.replace("bi-eye","bi-eye-slash");
    } else {
        input.type = "password";
        icon.classList.replace("bi-eye-slash","bi-eye");
    }
}
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
